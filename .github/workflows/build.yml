name: Build

on:
  pull_request:
    paths:
      - "demo_newregion/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build
        run: dotnet build
        working-directory: demo_newregion
